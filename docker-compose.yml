version: '3.8'

services:
  # First service: Pure PHP 8.4 environment for core domain logic
  php-clean:
    build:
      context: .
      dockerfile: ./docker/php-clean/Dockerfile
    container_name: portfolio_php_clean
    volumes:
      - ./apps/php-clean-domain:/usr/src/app
    command: tail -f /dev/null
    networks:
      - portfolio_network

networks:
  portfolio_network:
    driver: bridge
